<!-- Cost estimation badge for generations — popover rendered by global cost-popover.html -->
<template x-if="gen.estimatedCost">
  <span
    class="inline-block"
    @mouseenter="_costPos = $el.getBoundingClientRect(); _costData = gen; _costHover = gen.id"
    @mouseleave="_costHover = null"
  >
    <span
      class="{{badgeClass}} rounded-badge bg-accent/15 text-accent font-semibold cursor-pointer"
      x-text="t('gen.costPrefix') + ' ~$' + gen.estimatedCost.toFixed(4)"
    >Est.</span>
  </span>
</template>
