<!-- Cost estimation badge for generations — popover rendered by global cost-popover.html -->
<template x-if="gen.estimatedCost">
  <span
    class="inline-block"
    @mouseenter="showCostPopover($el, gen)"
    @mouseleave="hideMetaPopover()"
  >
    <span
      class="source-meta-pill {{badgeClass}} bg-accent/15 text-accent font-semibold cursor-pointer"
      x-text="t('gen.costPrefix') + ' ~$' + gen.estimatedCost.toFixed(4)"
      >Est.</span
    >
  </span>
</template>
