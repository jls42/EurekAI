<dialog
  x-ref="settingsDialog"
  class="rounded-dialog p-6 max-w-lg w-full max-h-[80vh] shadow-float glass"
>
  <div class="flex items-center justify-between mb-4">
    <h2 class="font-heading font-bold text-lg text-text-primary" x-text="t('settings.title')">
      Settings
    </h2>
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <button
      @click="closeSettingsDialog()"
      class="min-w-[44px] min-h-[44px] flex items-center justify-center text-text-secondary hover:text-text-primary focus-ring rounded-button"
      :aria-label="t('common.close')"
    >
      <i data-lucide="x" class="w-5 h-5"></i>
    </button>
  </div>
  <div class="overflow-y-auto max-h-[60vh] space-y-6">
    <div>
      <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
      <h3
        class="font-heading font-semibold text-sm text-text-secondary mb-2"
        x-text="t('settings.apiStatus')"
      >
        API Status
      </h3>
      <div class="flex gap-4">
        <span class="flex items-center gap-1.5 text-body-sm">
          <span
            class="w-3 h-3 rounded-full"
            :class="apiStatus.mistral ? 'bg-success' : 'bg-danger'"
          ></span>
          Mistral
        </span>
        <span class="flex items-center gap-1.5 text-body-sm">
          <span
            class="w-3 h-3 rounded-full"
            :class="apiStatus.elevenlabs ? 'bg-success' : 'bg-danger'"
          ></span>
          ElevenLabs
        </span>
      </div>
    </div>
    <div>
      <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
      <h3
        class="font-heading font-semibold text-sm text-text-secondary mb-2"
        x-text="t('settings.aiModels')"
      >
        AI Models
      </h3>
      <div class="space-y-3">
        <div>
          <label
            for="cfg-main-model"
            class="text-sm text-text-secondary block mb-1"
            x-text="t('settings.aiModel')"
            >AI Model</label
          >
          <select
            id="cfg-main-model"
            x-model="configDraft._mainModel"
            class="w-full input-modern px-3 py-2 text-body-sm"
          >
            <option
              value="mistral-large-latest"
              x-text="'mistral-large-latest — ' + t('settings.recommended')"
            ></option>
            <option value="mistral-medium-latest">mistral-medium-latest</option>
            <option value="mistral-small-latest">mistral-small-latest</option>
          </select>
          <p class="text-xs text-text-secondary mt-1" x-text="t('settings.aiModelHint')"></p>
        </div>
        <div class="flex items-center gap-2 text-body-sm text-text-secondary">
          <span x-text="t('settings.ocr') + ' :'"></span>
          <span
            class="font-mono text-xs px-2 py-0.5 rounded-button"
            style="background: var(--color-input-bg); border: 1px solid var(--color-input-border)"
            >mistral-ocr-latest</span
          >
        </div>
      </div>
    </div>
    <div>
      <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
      <h3
        class="font-heading font-semibold text-sm text-text-secondary mb-2"
        x-text="t('settings.voiceTts')"
      >
        Voice &amp; TTS
      </h3>
      <div class="space-y-3">
        <div>
          <label
            for="cfg-tts-provider"
            class="text-sm text-text-secondary block mb-1"
            x-text="t('settings.ttsProvider')"
            >TTS Provider</label
          >
          <select
            id="cfg-tts-provider"
            x-model="configDraft.ttsProvider"
            class="w-full input-modern px-3 py-2 text-body-sm"
          >
            <option value="elevenlabs">ElevenLabs</option>
            <option
              value="mistral"
              x-text="'Mistral (Voxtral) — ' + t('settings.recommended')"
            ></option>
          </select>
        </div>
        <div>
          <label
            for="cfg-tts-model"
            class="text-sm text-text-secondary block mb-1"
            x-text="t('settings.ttsModel')"
            >TTS Model</label
          >
          <!-- ElevenLabs models -->
          <select
            x-show="configDraft.ttsProvider === 'elevenlabs'"
            x-model="configDraft.ttsModel"
            class="w-full input-modern px-3 py-2 text-body-sm"
          >
            <option value="eleven_v3">eleven_v3</option>
            <option value="eleven_flash_v2_5">eleven_flash_v2_5</option>
            <option value="eleven_multilingual_v2">eleven_multilingual_v2</option>
          </select>
          <!-- Mistral models -->
          <select
            x-show="configDraft.ttsProvider === 'mistral'"
            x-model="configDraft.ttsModel"
            class="w-full input-modern px-3 py-2 text-body-sm"
          >
            <option
              value="voxtral-mini-tts-latest"
              x-text="'voxtral-mini-tts-latest — ' + t('settings.recommended')"
            ></option>
          </select>
          <p class="text-xs text-text-secondary mt-1" x-text="t('settings.ttsModelHint')"></p>
        </div>
        <!-- ElevenLabs voice IDs -->
        <div x-show="configDraft.ttsProvider === 'elevenlabs'" class="grid grid-cols-2 gap-3">
          <div>
            <label
              for="cfg-voice-host"
              class="text-sm text-text-secondary block mb-1"
              x-text="t('settings.voiceHost') + ' ID'"
              >Voice Host ID</label
            >
            <input
              id="cfg-voice-host"
              x-model="configDraft.voices.host.id"
              class="w-full input-modern px-3 py-2 text-body-sm"
            />
          </div>
          <div>
            <label
              for="cfg-voice-guest"
              class="text-sm text-text-secondary block mb-1"
              x-text="t('settings.voiceGuest') + ' ID'"
              >Voice Guest ID</label
            >
            <input
              id="cfg-voice-guest"
              x-model="configDraft.voices.guest.id"
              class="w-full input-modern px-3 py-2 text-body-sm"
            />
          </div>
        </div>
        <!-- Mistral voice selectors (dynamic from API) -->
        <div x-show="configDraft.ttsProvider === 'mistral'" class="grid grid-cols-2 gap-3">
          <div>
            <label
              for="cfg-mistral-voice-host"
              class="text-sm text-text-secondary block mb-1"
              x-text="t('settings.voiceHost')"
              >Voice Host</label
            >
            <select
              id="cfg-mistral-voice-host"
              x-model="configDraft.mistralVoices.host"
              @change="configDraft.mistralVoicesSource = 'user'"
              class="w-full input-modern px-3 py-2 text-body-sm"
            >
              <template x-for="v in mistralVoicesList" :key="'h-'+v.id">
                <option
                  :value="v.id"
                  x-text="langToFlag(v.lang) + ' ' + v.speaker + ' - ' + translateEmotion(v.emotion)"
                ></option>
              </template>
            </select>
          </div>
          <div>
            <label
              for="cfg-mistral-voice-guest"
              class="text-sm text-text-secondary block mb-1"
              x-text="t('settings.voiceGuest')"
              >Voice Guest</label
            >
            <select
              id="cfg-mistral-voice-guest"
              x-model="configDraft.mistralVoices.guest"
              @change="configDraft.mistralVoicesSource = 'user'"
              class="w-full input-modern px-3 py-2 text-body-sm"
            >
              <template x-for="v in mistralVoicesList" :key="'g-'+v.id">
                <option
                  :value="v.id"
                  x-text="langToFlag(v.lang) + ' ' + v.speaker + ' - ' + translateEmotion(v.emotion)"
                ></option>
              </template>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="flex gap-3">
      <button
        @click="resetSettings()"
        class="flex-1 min-h-touch rounded-button font-semibold text-body-sm transition-colors focus-ring border"
        style="border-color: var(--color-input-border); color: var(--color-text-secondary)"
        x-text="t('common.reset')"
      ></button>
      <button
        @click="saveSettings()"
        class="flex-1 bg-primary-dark text-white hover:bg-primary-dark/90 min-h-touch rounded-button font-semibold text-body-sm transition-colors card-lift btn-press focus-ring"
        x-text="t('common.save')"
      ></button>
    </div>
  </div>
</dialog>
