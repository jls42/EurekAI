<!-- ======================== QUIZ ======================== -->
<div x-show="activeView === 'quiz'">
  <div class="flex items-center justify-between mb-4">
    <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
    <h2 class="font-heading font-bold text-xl title-gradient" x-text="t('quiz.heading')">Quiz</h2>
    <button
      @click="generate('quiz')"
      :disabled="loading.quiz || sources.length === 0"
      class="px-4 min-h-touch rounded-button font-semibold text-body-sm flex items-center gap-2 btn-lift focus-ring bg-gen-quiz/10 text-gen-quiz hover:bg-gen-quiz/20 disabled:opacity-50"
    >
      <i x-show="!loading.quiz" data-lucide="plus" class="w-4 h-4"></i>
      <span
        x-show="loading.quiz"
        class="w-4 h-4 animate-spin rounded-full border-2 border-gen-quiz border-t-transparent"
      ></span>
      <span x-text="loading.quiz ? t('common.loading') : t('quiz.new')"></span>
    </button>
  </div>

  <div x-show="generationsByType('quiz').length === 0 && !loading.quiz" class="text-center py-12">
    <div
      class="w-16 h-16 mx-auto mb-3 bg-purple-50 rounded-[1rem] border border-gen-quiz/20 flex items-center justify-center"
    >
      <i data-lucide="brain" class="w-8 h-8 text-gen-quiz"></i>
    </div>
    <p class="text-text-primary font-semibold mb-1" x-text="t('quiz.emptyTitle')"></p>
    <p
      class="text-text-secondary text-body-sm mb-4"
      x-text="sources.length === 0 ? t('common.noSourcesYet') : t('quiz.emptyWithSources')"
    ></p>
    <button
      x-show="sources.length === 0"
      @click="goToView('sources')"
      class="bg-accent text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
      x-text="t('common.addSources')"
    ></button>
  </div>

  <div class="space-y-3">
    <template x-for="gen in generationsByType('quiz')" :key="gen.id">
      <div class="gen-card border-l-4 border-l-gen-quiz animate-slide-up">
        {{> gen-card-header icon="brain" chipClass="icon-chip-quiz" colorClass="gen-quiz" hasScore=true}}
        <div x-show="openGens[gen.id]" x-transition class="px-4 pb-4 border-t border-gray-100">
          <!-- Interactive step-by-step quiz -->
          <div x-data="quizComponent(gen)">
            <!-- Attempt history -->
            <div
              x-show="gen.stats && gen.stats.attempts.length > 0"
              class="mb-4 flex flex-wrap gap-2"
            >
              <template x-for="(att, ai) in (gen.stats?.attempts || [])" :key="ai">
                <span
                  class="text-sm px-2.5 py-1 rounded-badge font-semibold"
                  :class="att.score === att.total ? 'bg-success-light text-success-dark' : 'bg-gray-100 text-text-secondary'"
                  x-text="'T' + (ai+1) + ': ' + att.score + '/' + att.total"
                ></span>
              </template>
            </div>

            <!-- Active question (step-by-step) -->
            <template x-if="!finished">
              <div>
                {{> step-progress-nav colorClass="gen-quiz"}}
                <!-- Progress bar -->
                <div class="h-2 rounded-full bg-gray-200 mb-4">
                  <div
                    class="h-2 rounded-full bg-gen-quiz transition-all duration-500"
                    :style="'width:' + progress() + '%'"
                  ></div>
                </div>

                <!-- Question card -->
                <div class="bg-gray-50 rounded-card p-5 mb-4">
                  <p
                    class="font-heading font-semibold text-body-sm mb-4 text-text-primary"
                    x-text="'Q' + (currentIndex() + 1) + '. ' + currentQuestion()?.question"
                  ></p>
                  <div class="space-y-2">
                    <template x-for="(choice, ci) in currentQuestion()?.choices || []" :key="ci">
                      <button
                        class="w-full text-left px-4 py-3 rounded-button text-body-sm border-2 transition-all btn-press focus-ring"
                        :class="{
                          'border-success bg-success-light font-semibold text-success-dark': feedback && ci === currentQuestion()?.correct,
                          'border-danger bg-danger-light text-danger-dark': feedback && selectedChoice === ci && ci !== currentQuestion()?.correct,
                          'border-gray-200 bg-surface hover:border-primary hover:bg-primary-light': !feedback
                        }"
                        @click="selectChoice(ci)"
                        :disabled="!!feedback"
                        x-text="choice"
                      ></button>
                    </template>
                  </div>
                </div>

                <!-- Feedback (after selecting a choice) -->
                <div x-show="feedback" x-transition>
                  <div
                    class="p-4 rounded-card mb-3"
                    :class="feedback?.correct
                      ? 'bg-success-light border-2 border-success animate-correct'
                      : 'bg-danger-light border-2 border-danger animate-wrong'"
                  >
                    <p
                      class="font-heading font-bold text-body-sm"
                      :class="feedback?.correct ? 'text-success-dark' : 'text-danger-dark'"
                      x-text="feedback?.correct ? t('quiz.correct') : t('quiz.incorrect')"
                    ></p>
                    <p
                      class="text-body-sm mt-1 text-text-primary"
                      x-text="currentQuestion()?.explanation"
                    ></p>
                    <!-- Source refs for this question -->
                    <div
                      x-show="questionSources(gen, currentQuestion()).length > 0"
                      class="flex flex-wrap items-center gap-1.5 mt-2 pt-2 border-t border-current/10"
                    >
                      <span class="text-xs opacity-70 flex items-center gap-1"
                        ><i data-lucide="book-open" class="w-3 h-3"></i>
                        <span x-text="t('quiz.verify')"></span
                      ></span>
                      <template
                        x-for="src in questionSources(gen, currentQuestion())"
                        :key="src.id"
                      >
                        <button
                          @click.stop="openSourceDialog(src)"
                          class="source-badge text-[0.65em]"
                          :title="src.filename"
                          x-text="sources.indexOf(src) + 1"
                        ></button>
                      </template>
                    </div>
                  </div>
                  <div x-show="!isReviewing()" class="text-center">
                    <button
                      @click="nextQuestion()"
                      class="bg-primary-dark text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring inline-flex items-center gap-2"
                    >
                      <span x-text="t('step.next')"></span>
                      <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
              </div>
            </template>

            <!-- Finished screen -->
            <template x-if="finished">
              <div class="text-center py-8">
                <div
                  class="inline-block px-8 py-4 rounded-card mb-4"
                  :class="score === items().length ? 'bg-success-light' : 'bg-warning-light'"
                >
                  <p
                    class="font-heading font-bold text-3xl"
                    :class="score === items().length ? 'text-success-dark' : 'text-warning-dark'"
                    x-text="score + '/' + items().length"
                  ></p>
                  <p
                    class="text-body-sm font-medium mt-1"
                    :class="score === items().length ? 'text-success-dark' : 'text-warning-dark'"
                    x-text="score === items().length ? t('quiz.perfect') : t('quiz.keepGoing')"
                  ></p>
                </div>
                <div class="flex gap-3 justify-center flex-wrap">
                  <button
                    x-show="score < items().length"
                    @click="reviewErrors()"
                    :disabled="reviewing"
                    class="bg-warning-dark text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring disabled:opacity-50"
                  >
                    <span x-show="!reviewing" x-text="t('quiz.reviewErrors')"></span>
                    <span x-show="reviewing" class="flex items-center gap-2"
                      ><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                      <span x-text="t('common.generating')"></span
                    ></span>
                  </button>
                  <button
                    x-show="score < items().length"
                    @click="retryWrongQuestions()"
                    class="bg-gen-quiz text-white px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
                    x-text="t('step.retryWrong')"
                  ></button>
                  <button
                    @click="resetQuiz()"
                    class="bg-gray-200 text-text-primary px-5 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring"
                    x-text="t('quiz.restart')"
                  ></button>
                </div>
              </div>
            </template>

            {{> gen-source-refs}}
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
