<!-- Profile Picker Overlay -->
<div
  x-show="showProfilePicker"
  x-transition.opacity
  class="fixed inset-0 z-50 bg-canvas flex items-center justify-center p-4 overflow-y-auto"
>
  <div
    class="w-full max-w-5xl my-auto flex flex-col lg:flex-row items-center lg:items-end gap-8 lg:gap-16"
  >
    <!-- Left: Logo branding (hidden when editing) -->
    <div x-show="!editingProfile" class="shrink-0 text-center">
      <img
        src="/logo.webp"
        alt="EurekAI"
        class="w-64 h-64 lg:w-96 lg:h-96 mx-auto drop-shadow-lg"
      />
      <h1 class="font-heading font-bold text-3xl lg:text-4xl title-gradient mt-4">EurekAI</h1>
      <p class="text-text-secondary text-body-sm mt-1" x-text="t('profile.selectOrCreate')"></p>
    </div>

    <!-- Right: Profile selection (full width when editing) -->
    <div class="flex-1 min-w-0 w-full" :class="editingProfile ? 'max-w-2xl mx-auto' : 'lg:max-w-lg'">
      <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
      <h2
        class="font-heading font-bold text-2xl title-gradient mb-6 text-center"
        x-text="t('profile.whoIsLearning')"
      >
        Who is learning?
      </h2>

      <!-- Existing profiles grid -->
      <div
        x-show="profiles.length > 0 && !showProfileForm && !editingProfile"
        class="flex flex-wrap justify-center gap-4 mb-6"
      >
        <template x-for="p in profiles" :key="p.id">
          <div
            @click="selectProfile(p.id)"
            role="button"
            tabindex="0"
            onkeydown="
              if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                this.click();
              }
            "
            class="relative group bg-surface rounded-card p-5 shadow-card hover:shadow-float transition-all card-lift btn-press focus-ring text-center cursor-pointer w-48"
          >
            <span
              class="w-36 aspect-[4/5] rounded-xl block mx-auto mb-3 shrink-0"
              :style="avatarStyle(p.avatar)"
            ></span>
            <span class="font-heading font-bold text-lg block truncate" x-text="p.name"></span>
            <span
              class="text-sm text-text-secondary"
              x-text="t('profile.ageLabel', { age: p.age })"
            ></span>
            <span
              class="block text-xs mt-1.5 px-2 py-0.5 rounded-full inline-block"
              :class="{
              'bg-green-100 text-green-700': p.ageGroup === 'enfant',
              'bg-blue-100 text-blue-700': p.ageGroup === 'ado',
              'bg-purple-100 text-purple-700': p.ageGroup === 'etudiant',
              'bg-orange-100 text-orange-700': p.ageGroup === 'adulte'
            }"
              x-text="t('profile.group.' + p.ageGroup)"
            ></span>
            <!-- Moderation badge -->
            <button
              @click.stop="toggleModeration(p.id)"
              class="mt-1.5 inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full transition-colors"
              :class="p.useModeration ? 'bg-green-50 text-green-600 hover:bg-green-100' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'"
              :title="p.useModeration ? t('profile.moderationOn') : t('profile.moderationOff')"
            >
              <i :data-lucide="p.useModeration ? 'shield-check' : 'shield-off'" class="w-3 h-3"></i>
            </button>
            <!-- Chat badge -->
            <button
              @click.stop="toggleChat(p.id)"
              class="mt-1 inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full transition-colors"
              :class="p.chatEnabled ? 'bg-blue-50 text-blue-600 hover:bg-blue-100' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'"
              :title="p.chatEnabled ? t('profile.chatOn') : t('profile.chatOff')"
            >
              <i data-lucide="message-circle" class="w-3 h-3"></i>
            </button>
            <div
              class="absolute top-1.5 right-1.5 flex gap-0.5 opacity-0 group-hover:opacity-60 hover:!opacity-100 transition-opacity"
            >
              <button
                @click.stop="startEditProfile(p.id)"
                class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-primary/10 hover:text-primary transition-colors focus-ring"
                :aria-label="t('profile.editProfile')"
              >
                <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
              </button>
              <button
                @click.stop="deleteProfile(p.id)"
                class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-danger/10 hover:text-danger transition-colors focus-ring"
                :aria-label="t('common.delete')"
              >
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </template>
      </div>

      <!-- New profile button -->
      <div x-show="!showProfileForm && !editingProfile" class="text-center">
        <button
          @click="showProfileForm = true; $nextTick(() => refreshIcons())"
          class="bg-primary text-white px-6 min-h-touch rounded-button font-semibold text-body-sm btn-press focus-ring inline-flex items-center gap-2"
        >
          <i data-lucide="plus" class="w-4 h-4"></i>
          <span x-text="t('profile.addProfile')"></span>
        </button>
      </div>

      <!-- New profile form -->
      <div
        x-show="showProfileForm && !editingProfile"
        class="bg-surface rounded-card p-6 shadow-card max-w-lg mx-auto"
      >
        <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
        <h2
          class="font-heading font-bold text-lg mb-4 text-center"
          x-text="t('profile.newProfile')"
        >
          New Profile
        </h2>

        <label
          for="new-name"
          class="block text-body-sm font-medium mb-1"
          x-text="t('profile.nameLabel')"
          >Name</label
        >
        <input
          id="new-name"
          type="text"
          x-model="newProfileName"
          class="input-modern w-full px-3 py-2 mb-3"
          :placeholder="t('profile.namePlaceholder')"
          maxlength="20"
        />

        <label
          for="new-age"
          class="block text-body-sm font-medium mb-1"
          x-text="t('profile.ageLabel2')"
          >Age</label
        >
        <input
          id="new-age"
          type="number"
          inputmode="numeric"
          x-model.number="newProfileAge"
          class="input-modern w-full px-3 py-2 mb-3"
          min="4"
          max="120"
          placeholder="9"
        />

        <span class="block text-body-sm font-medium mb-1" x-text="t('profile.localeLabel')"></span>
        <div class="relative mb-3" x-data="{ langOpen: false }">
          <button
            @click="langOpen = !langOpen"
            @click.outside="langOpen = false"
            class="input-modern w-full px-3 py-2 flex items-center gap-2 text-left rounded-button cursor-pointer"
          >
            <span x-text="langFlag(newProfileLocale)"></span>
            <span x-text="langLabel(newProfileLocale)"></span>
            <i data-lucide="chevron-down" class="w-4 h-4 ml-auto text-text-secondary"></i>
          </button>
          <div
            x-show="langOpen"
            x-transition
            class="absolute left-0 top-full mt-1 bg-surface rounded-card shadow-float py-1 w-full max-h-[240px] overflow-y-auto z-50"
          >
            <template x-for="lang in uiLanguages" :key="lang.code">
              <button
                @click="newProfileLocale = lang.code; langOpen = false"
                class="w-full px-3 py-2 text-left text-body-sm hover:bg-primary/10 transition-colors flex items-center gap-2"
              >
                <span x-text="lang.flag"></span>
                <span x-text="lang.label"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- PIN parental (for under 15) -->
        <div x-show="Number(newProfileAge) >= 4 && Number(newProfileAge) < 15" class="mb-3">
          <div class="bg-amber-50 border border-amber-200 rounded-card p-3 mb-3">
            <div class="flex items-start gap-2">
              <i data-lucide="shield-alert" class="w-5 h-5 text-amber-500 shrink-0 mt-0.5"></i>
              <p class="text-body-sm text-amber-800" x-text="t('profile.pinInfo')"></p>
            </div>
          </div>
          <label
            for="new-pin"
            class="block text-body-sm font-medium mb-1"
            x-text="t('profile.pinLabel')"
            >PIN</label
          >
          <input
            id="new-pin"
            type="password"
            inputmode="numeric"
            maxlength="4"
            x-model="newProfilePin"
            class="input-modern w-full px-3 py-2 mb-2 font-mono tracking-[0.5em]"
            :placeholder="t('profile.pinPlaceholder')"
            autocomplete="off"
          />
          <label
            for="new-pin-confirm"
            class="block text-body-sm font-medium mb-1"
            x-text="t('profile.pinConfirmLabel')"
            >Confirm PIN</label
          >
          <input
            id="new-pin-confirm"
            type="password"
            inputmode="numeric"
            maxlength="4"
            x-model="newProfilePinConfirm"
            class="input-modern w-full px-3 py-2 font-mono tracking-[0.5em]"
            :placeholder="t('profile.pinPlaceholder')"
            autocomplete="off"
          />
          <p
            x-show="newProfilePin && newProfilePinConfirm && newProfilePin !== newProfilePinConfirm"
            class="text-xs text-danger mt-1"
            x-text="t('profile.pinMismatch')"
          ></p>
        </div>

        <span class="block text-body-sm font-medium mb-2" x-text="t('profile.avatarLabel')"></span>
        <div class="grid grid-cols-5 gap-2 mb-4">
          <template x-for="av in profileAvatars" :key="av">
            <button
              @click="newProfileAvatar = av"
              class="aspect-[4/5] rounded-xl overflow-hidden transition-all focus-ring"
              :class="newProfileAvatar === av ? 'ring-3 ring-primary scale-105 shadow-float' : 'ring-1 ring-gray-200 hover:ring-gray-300 hover:shadow-card'"
            >
              <span class="w-full h-full block" :style="avatarStyle(av)"></span>
            </button>
          </template>
        </div>

        <div class="flex gap-2">
          <button
            @click="showProfileForm = false"
            class="flex-1 min-h-touch rounded-button font-semibold text-body-sm bg-gray-100 text-text-secondary hover:bg-gray-200 transition-colors btn-press focus-ring"
            x-text="t('common.cancel')"
          ></button>
          <button
            @click="createProfile()"
            :disabled="!newProfileName.trim() || !newProfileAge || (Number(newProfileAge) < 15 && (!/^\d{4}$/.test(newProfilePin) || newProfilePin !== newProfilePinConfirm))"
            class="flex-1 min-h-touch rounded-button font-semibold text-body-sm bg-primary text-white hover:bg-primary/90 transition-colors btn-press focus-ring disabled:opacity-50"
            x-text="t('common.add')"
          ></button>
        </div>
      </div>

      <!-- Edit profile form -->
      <template x-if="editingProfile">
        <div class="bg-surface rounded-card p-6 shadow-card max-w-2xl mx-auto">
          <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
          <h2
            class="font-heading font-bold text-lg mb-5 text-center"
            x-text="t('profile.editProfile')"
          >
            Edit Profile
          </h2>

          <!-- Section: Identity — name, age, language side by side -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <div>
              <label for="edit-name" class="block text-body-sm font-medium mb-1" x-text="t('profile.nameLabel')">Name</label>
              <input
                id="edit-name" type="text" x-model="editingProfile.name" @input="autoSaveProfile()"
                class="input-modern w-full px-3 py-2" :placeholder="t('profile.namePlaceholder')" maxlength="20"
              />
            </div>
            <div>
              <label for="edit-age" class="block text-body-sm font-medium mb-1" x-text="t('profile.ageLabel2')">Age</label>
              <input
                id="edit-age" type="number" inputmode="numeric" x-model.number="editingProfile.age" @change="autoSaveProfile(true)"
                class="input-modern w-full px-3 py-2" min="4" max="120" placeholder="9"
              />
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <!-- Language -->
            <div>
              <span class="block text-body-sm font-medium mb-1" x-text="t('profile.localeLabel')"></span>
              <div class="relative" x-data="{ langOpen: false }">
                <button
                  @click="langOpen = !langOpen" @click.outside="langOpen = false"
                  class="input-modern w-full px-3 py-2 flex items-center gap-2 text-left rounded-button cursor-pointer"
                >
                  <span x-text="langFlag(editingProfile?.locale)"></span>
                  <span x-text="langLabel(editingProfile?.locale)"></span>
                  <i data-lucide="chevron-down" class="w-4 h-4 ml-auto text-text-secondary"></i>
                </button>
                <div
                  x-show="langOpen" x-transition
                  class="absolute left-0 top-full mt-1 bg-surface rounded-card shadow-float py-1 w-full max-h-[240px] overflow-y-auto z-50"
                >
                  <template x-for="lang in uiLanguages" :key="lang.code">
                    <button
                      @click="editingProfile.locale = lang.code; langOpen = false; autoSaveProfile(true)"
                      class="w-full px-3 py-2 text-left text-body-sm hover:bg-primary/10 transition-colors flex items-center gap-2"
                    >
                      <span x-text="lang.flag"></span>
                      <span x-text="lang.label"></span>
                    </button>
                  </template>
                </div>
              </div>
            </div>
            <!-- Theme -->
            <div>
              <!-- NOSONAR(S5765) — Alpine.js x-text fills label content at runtime -->
              <label for="edit-theme" class="text-body-sm font-medium block mb-1" x-text="t('profile.theme')"></label>
              <select id="edit-theme" x-model="editingProfile.theme" @change="applyThemeLive()" class="w-full input-modern px-3 py-2 text-body-sm">
                <option value="" x-text="t('profile.themeDefault')"></option>
                <option value="dark" x-text="t('profile.themeDark')"></option>
                <option value="light" x-text="t('profile.themeLight')"></option>
              </select>
            </div>
          </div>

          <!-- Section: Avatar -->
          <span class="block text-body-sm font-medium mb-2" x-text="t('profile.avatarLabel')"></span>
          <div class="flex items-start gap-4 mb-5">
            <!-- Preview -->
            <span
              class="w-24 sm:w-28 aspect-[4/5] rounded-2xl shrink-0 block ring-3 ring-primary shadow-float transition-all"
              :style="avatarStyle(editingProfile?.avatar)"
            ></span>
            <!-- Grid -->
            <div class="grid grid-cols-5 sm:grid-cols-8 gap-1.5 flex-1">
              <template x-for="av in profileAvatars" :key="av">
                <button
                  @click="editingProfile.avatar = av; autoSaveProfile(true)"
                  class="aspect-[4/5] rounded-lg overflow-hidden transition-all focus-ring"
                  :class="editingProfile?.avatar === av ? 'ring-2 ring-primary scale-105 shadow-float' : 'ring-1 ring-gray-200 hover:ring-gray-300 hover:shadow-card hover:scale-105'"
                >
                  <span class="w-full h-full block" :style="avatarStyle(av)"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Section: Voice preferences -->
          <div x-show="mistralVoicesList.length > 0" class="mb-4 p-3 bg-gray-50 rounded-card">
            <span class="text-body-sm font-medium" x-text="t('profile.voicePreferences')"></span>
            <p class="text-xs text-text-secondary mb-2" x-text="t('profile.voicePreferencesHint')"></p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <!-- NOSONAR(S5765) — Alpine.js x-text fills label content at runtime -->
                <label for="edit-voice-host" class="text-xs text-text-secondary block mb-1" x-text="t('settings.voiceHost')"></label>
                <select id="edit-voice-host" x-model="editingProfile.mistralVoices.host" @change="autoSaveProfile(true)" class="w-full input-modern px-3 py-2 text-body-sm">
                  <option value="" x-text="t('profile.voiceDefault')"></option>
                  <template x-for="v in mistralVoicesList" :key="'ph-'+v.id">
                    <option :value="v.id" x-text="langToFlag(v.lang) + ' ' + v.speaker + ' - ' + translateEmotion(v.emotion)"></option>
                  </template>
                </select>
              </div>
              <div>
                <!-- NOSONAR(S5765) — Alpine.js x-text fills label content at runtime -->
                <label for="edit-voice-guest" class="text-xs text-text-secondary block mb-1" x-text="t('settings.voiceGuest')"></label>
                <select id="edit-voice-guest" x-model="editingProfile.mistralVoices.guest" @change="autoSaveProfile(true)" class="w-full input-modern px-3 py-2 text-body-sm">
                  <option value="" x-text="t('profile.voiceDefault')"></option>
                  <template x-for="v in mistralVoicesList" :key="'pg-'+v.id">
                    <option :value="v.id" x-text="langToFlag(v.lang) + ' ' + v.speaker + ' - ' + translateEmotion(v.emotion)"></option>
                  </template>
                </select>
              </div>
            </div>
            <div
              x-show="(!editingProfile.mistralVoices.host || !editingProfile.mistralVoices.guest) && defaultVoiceHint(editingProfile.locale)"
              class="mt-2 px-3 py-1.5 rounded-lg bg-blue-500/10 border border-blue-500/20 text-xs text-blue-400 flex items-center gap-1.5"
            >
              <span>🎙️</span>
              <span x-text="t('profile.voiceCurrentDefault') + ' ' + defaultVoiceHint(editingProfile.locale)"></span>
            </div>
          </div>

          <!-- Section: Safety — moderation + chat side by side toggles -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <!-- Moderation toggle -->
            <div class="p-3 bg-gray-50 rounded-card">
              <div class="flex items-center justify-between">
                <div>
                  <span class="text-body-sm font-medium" x-text="t('profile.moderationToggle')"></span>
                  <p class="text-xs text-text-secondary" x-text="editingProfile?.useModeration ? t('profile.moderationOn') : t('profile.moderationOff')"></p>
                </div>
                <button
                  @click="requireParentalAccess(() => { editingProfile.useModeration = !editingProfile.useModeration; autoSaveParental() })"
                  class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus-ring shrink-0"
                  :class="editingProfile?.useModeration ? 'bg-green-500' : 'bg-gray-300'"
                >
                  <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform" :class="editingProfile?.useModeration ? 'translate-x-6' : 'translate-x-1'"></span>
                </button>
              </div>
            </div>
            <!-- Chat toggle -->
            <div class="p-3 bg-gray-50 rounded-card">
              <div class="flex items-center justify-between">
                <div>
                  <span class="text-body-sm font-medium" x-text="t('profile.chatToggle')"></span>
                  <p class="text-xs text-text-secondary" x-text="editingProfile?.chatEnabled ? t('profile.chatOn') : t('profile.chatOff')"></p>
                </div>
                <button
                  @click="requireParentalAccess(() => { editingProfile.chatEnabled = !editingProfile.chatEnabled; autoSaveParental() })"
                  class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus-ring shrink-0"
                  :class="editingProfile?.chatEnabled ? 'bg-blue-500' : 'bg-gray-300'"
                >
                  <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform" :class="editingProfile?.chatEnabled ? 'translate-x-6' : 'translate-x-1'"></span>
                </button>
              </div>
            </div>
          </div>

          <!-- Moderation categories (when moderation is enabled) -->
          <div
            x-show="editingProfile?.useModeration && allModerationCategories.length > 0"
            x-transition
            class="mb-4 p-3 bg-gray-50 rounded-card"
          >
            <span class="text-body-sm font-medium" x-text="t('profile.moderationCategories')"></span>
            <p class="text-xs text-text-secondary mb-2" x-text="t('profile.moderationCategoriesHint')"></p>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-1.5">
              <template x-for="cat in allModerationCategories" :key="cat">
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                  <input
                    type="checkbox" :value="cat" :aria-label="t('moderation.cat.' + cat)"
                    x-model="editingProfile.moderationCategories" @change="autoSaveParental()"
                    class="w-4 h-4 rounded text-primary accent-primary focus-ring"
                  />
                  <span x-text="t('moderation.cat.' + cat)"></span>
                </label>
              </template>
            </div>
            <button
              @click="editingProfile.moderationCategories = defaultModerationCategories(editingProfile.ageGroup); autoSaveParental()"
              class="text-xs text-primary mt-2 hover:underline"
              x-text="t('profile.moderationResetDefaults')"
            ></button>
          </div>

          <!-- Actions -->
          <div class="flex gap-2">
            <button
              @click="resetProfileDefaults()"
              class="min-h-touch px-4 rounded-button font-semibold text-body-sm bg-gray-100 text-text-secondary hover:bg-gray-200 transition-colors btn-press focus-ring"
              x-text="t('profile.resetDefaults')"
            ></button>
            <button
              @click="closeEditProfile()"
              class="flex-1 min-h-touch rounded-button font-semibold text-body-sm bg-primary text-white hover:bg-primary/90 transition-colors btn-press focus-ring inline-flex items-center justify-center gap-2"
            >
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              <span x-text="t('profile.backToProfiles')"></span>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>
