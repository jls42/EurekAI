<!-- Single global badge popover — rendered once in the layout. -->
<div
  x-show="_metaPopoverPos && _metaPopoverTitle"
  x-transition.opacity.duration.150ms
  class="fixed z-[9999] bg-surface border border-gray-600 rounded-card shadow-lg px-3 py-2 text-xs whitespace-nowrap pointer-events-none"
  :style="metaPopoverStyle()"
>
  <div class="font-semibold text-text-primary mb-1" x-text="_metaPopoverTitle">Details</div>
  <template x-for="(line, idx) in _metaPopoverLines" :key="idx + '-' + line">
    <div :class="_metaPopoverLineClass" x-text="line"></div>
  </template>
  <template x-if="_metaPopoverFooter">
    <div
      class="border-t border-gray-600 mt-1 pt-1 font-semibold"
      :class="_metaPopoverFooterClass"
      x-text="_metaPopoverFooter"
    >
      Value
    </div>
  </template>
</div>
