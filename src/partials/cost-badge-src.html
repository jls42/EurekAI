<!-- Cost estimation badge for sources — popover rendered by global cost-popover.html -->
<template x-if="src.estimatedCost != null">
  <span
    class="inline-block"
    @mouseenter="showCostPopover($el, src)"
    @mouseleave="hideMetaPopover()"
  >
    <span
      class="source-meta-pill {{badgeClass}} bg-accent/15 text-accent font-semibold cursor-pointer"
      x-text="t('gen.costPrefix') + ' ~$' + src.estimatedCost.toFixed(4)"
      >Est.</span
    >
  </span>
</template>
