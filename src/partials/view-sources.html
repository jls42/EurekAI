<!-- ======================== SOURCES ======================== -->
<div x-show="activeView === 'sources'">
  <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
  <h2
    class="font-heading font-bold text-xl title-gradient mb-1 pt-3 hero-accent-border"
    x-text="t('sources.heading')"
  >
    Sources
  </h2>
  <p class="text-text-secondary text-body-sm mb-5" x-text="t('sources.subtitle')"></p>

  <!-- CTA: Generate from sources (visible when sources exist) -->
  <div
    x-show="sources.length > 0 && !uploading && !loading.voice && !loading.websearch"
    class="mb-5 bg-gradient-to-br from-primary-light/60 to-accent-light/40 border border-primary/20 rounded-card p-4 animate-slide-up"
  >
    <div class="flex items-center gap-3 mb-3">
      <div
        class="w-10 h-10 bg-white rounded-[0.75rem] shadow-card flex items-center justify-center shrink-0"
      >
        <i data-lucide="sparkles" class="w-5 h-5 text-primary"></i>
      </div>
      <div class="flex-1 min-w-0">
        <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
        <h3
          class="font-heading font-bold text-text-primary text-body-sm"
          x-text="t('sources.ready')"
        >
          Ready
        </h3>
        <p
          class="text-sm text-text-secondary"
          x-text="t('sources.selectedCount', { count: selectedIds.length })"
        ></p>
      </div>
    </div>
    <div class="grid grid-cols-3 sm:grid-cols-3 gap-2 mb-3">
      <template
        x-for="cat in categories.filter(c => !['dashboard','sources','chat'].includes(c.key))"
        :key="cat.key"
      >
        <button
          @click="generate(cat.key)"
          :disabled="loading[cat.key] || (['podcast','quiz-vocal'].includes(cat.key) && !apiStatus.ttsAvailable)"
          :title="['podcast','quiz-vocal'].includes(cat.key) && !apiStatus.ttsAvailable ? t('gen.needsTts') : ''"
          class="flex items-center justify-center gap-2 px-3 py-2.5 bg-white rounded-button shadow-card font-semibold text-sm btn-lift focus-ring disabled:opacity-50"
          :style="'color:' + cat.color"
        >
          <i x-show="!loading[cat.key]" :data-lucide="cat.icon" class="w-4 h-4"></i>
          <span
            x-show="loading[cat.key]"
            class="w-4 h-4 animate-spin rounded-full border-2 border-current border-t-transparent"
          ></span>
          <span x-text="loading[cat.key] ? '...' : t('gen.' + cat.key)"></span>
        </button>
      </template>
    </div>
    <div class="flex items-center justify-center gap-2 mb-3">
      <span class="text-xs text-text-secondary" x-text="t('gen.questionCount')"></span>
      <template x-for="n in countOptions" :key="n">
        <button
          @click="generateCount = n"
          class="px-2.5 py-1 rounded-badge text-xs font-semibold transition-colors btn-press"
          :class="generateCount === n
            ? 'bg-primary text-white'
            : 'bg-gray-100 text-text-secondary hover:bg-gray-200'"
          x-text="'~' + n"
        ></button>
      </template>
    </div>
    <button
      @click="generateAuto()"
      :disabled="isGenerating()"
      class="w-full min-h-[48px] bg-gradient-to-r from-primary to-accent text-white rounded-button font-bold text-body-sm flex items-center justify-center gap-2 shadow-card btn-lift focus-ring disabled:opacity-50"
    >
      <i data-lucide="sparkles" class="w-5 h-5"></i>
      <span x-text="t('sources.autoMagic')"></span>
    </button>
  </div>

  <!-- Bento Grid 2x2 -->
  <div class="grid grid-cols-2 gap-3 mb-6">
    <label
      class="relative flex flex-col items-center justify-center gap-2 min-h-[100px] bg-surface rounded-card shadow-card border-2 border-transparent hover:border-primary hover:bg-primary-light cursor-pointer transition-all card-lift focus-within:ring-2 focus-within:ring-primary focus-within:ring-offset-2"
      :title="t('sources.importHint')"
    >
      <i data-lucide="upload" class="w-8 h-8 text-primary"></i>
      <span class="font-semibold text-body-sm text-text-primary" x-text="t('sources.import')"></span>
      <span class="text-[0.65rem] text-text-secondary" x-text="t('sources.importFormats')"></span>
      <input
        type="file"
        multiple
        accept=".jpg,.jpeg,.png,.pdf,.txt,.md"
        class="sr-only"
        :aria-label="t('sources.import')"
        @change="handleFiles($event.target.files)"
      />
    </label>

    <button
      @click="showTextInput = !showTextInput"
      class="flex flex-col items-center justify-center gap-2 min-h-[100px] bg-surface rounded-card shadow-card border-2 border-transparent hover:border-gen-summary hover:bg-blue-50 transition-all card-lift focus-ring"
      :class="showTextInput && 'border-gen-summary bg-blue-50'"
    >
      <i data-lucide="pencil" class="w-8 h-8 text-gen-summary"></i>
      <span class="font-semibold text-body-sm text-text-primary" x-text="t('sources.text')"></span>
    </button>

    <button
      @click="toggleRecording()"
      :disabled="loading.voice"
      class="flex flex-col items-center justify-center gap-2 min-h-[100px] bg-surface rounded-card shadow-card border-2 border-transparent hover:border-gen-quizvocal hover:bg-orange-50 transition-all card-lift focus-ring"
      :class="recording && 'border-danger bg-danger-light animate-pulse'"
    >
      <i
        data-lucide="mic"
        class="w-8 h-8"
        :class="recording ? 'text-danger' : 'text-gen-quizvocal'"
      ></i>
      <span
        class="font-semibold text-body-sm text-text-primary"
        x-text="recording ? formatDuration(recordingDuration) : (loading.voice ? t('sources.transcription') : t('sources.voice'))"
      ></span>
    </button>

    <button
      @click="showWebInput = true"
      class="relative flex flex-col items-center justify-center gap-2 min-h-[100px] bg-surface rounded-card shadow-card border-2 border-transparent hover:border-gen-podcast hover:bg-teal-50 transition-all card-lift focus-ring"
      :class="showWebInput && 'border-gen-podcast bg-teal-50'"
    >
      <i data-lucide="globe" class="w-8 h-8 text-gen-podcast"></i>
      <span class="font-semibold text-body-sm text-text-primary" x-text="t('sources.web')"></span>
    </button>
  </div>

  <!-- Text input -->
  <div x-show="showTextInput" x-transition class="mb-4">
    <div class="bg-surface rounded-card shadow-card p-4">
      <textarea
        x-model="textInput"
        class="w-full input-modern p-3 text-body-sm resize-none"
        rows="4"
        :placeholder="t('sources.textPlaceholder')"
      ></textarea>
      <div class="flex justify-end gap-2 mt-2">
        <button
          @click="showTextInput = false; textInput = ''"
          class="px-4 min-h-touch rounded-button text-body-sm font-medium text-text-secondary hover:bg-gray-100 btn-press focus-ring"
          x-text="t('common.cancel')"
        ></button>
        <button
          @click="addText()"
          :disabled="!textInput.trim() || uploading"
          class="bg-primary-dark text-white px-5 min-h-touch rounded-button font-semibold text-body-sm disabled:opacity-50 btn-press focus-ring"
          x-text="t('common.add')"
        ></button>
      </div>
    </div>
  </div>

  <!-- Web search input -->
  <div x-show="showWebInput" x-transition class="mb-4">
    <div class="bg-surface rounded-card shadow-card p-4 space-y-2">
      <div class="flex gap-2">
        <input
          x-model="webQuery"
          @keydown.enter="searchWeb()"
          class="flex-1 input-modern px-3 py-2 text-body-sm"
          :placeholder="t('sources.webPlaceholder')"
        />
        <button
          @click="searchWeb()"
          :disabled="!webQuery.trim() || loading.websearch"
          class="bg-gen-podcast text-white px-5 min-h-touch rounded-button font-semibold text-body-sm disabled:opacity-50 btn-press focus-ring flex items-center gap-2"
        >
          <i data-lucide="search" class="w-4 h-4"></i>
          <span x-text="loading.websearch ? t('sources.searching') : t('sources.search')"></span>
        </button>
      </div>
      <!-- Scrape engine selector -->
      <div class="flex items-center gap-1 text-xs">
        <span class="text-text-secondary mr-1" x-text="t('sources.scrapeEngine')"></span>
        <button
          @click="scrapeMode = 'auto'"
          :class="scrapeMode === 'auto' ? 'bg-primary text-white' : 'bg-gray-100 text-text-secondary hover:bg-gray-200'"
          class="px-2.5 py-1 rounded-full font-medium transition-colors flex items-center gap-1"
          :title="t('sources.scrapeAutoTip')"
        >
          <i data-lucide="wand" class="w-3 h-3"></i>
          Auto
        </button>
        <button
          @click="scrapeMode = 'readability'"
          :class="scrapeMode === 'readability' ? 'bg-success text-white' : 'bg-gray-100 text-text-secondary hover:bg-gray-200'"
          class="px-2.5 py-1 rounded-full font-medium transition-colors flex items-center gap-1"
          :title="t('sources.scrapeReadabilityTip')"
        >
          <i data-lucide="file-text" class="w-3 h-3"></i>
          R
        </button>
        <button
          @click="scrapeMode = 'lightpanda'"
          :class="scrapeMode === 'lightpanda' ? 'bg-primary text-white' : 'bg-gray-100 text-text-secondary hover:bg-gray-200'"
          class="px-2.5 py-1 rounded-full font-medium transition-colors flex items-center gap-1"
          :title="t('sources.scrapeLightpandaTip')"
        >
          <i data-lucide="globe" class="w-3 h-3"></i>
          LP
        </button>
      </div>
    </div>
  </div>

  <!-- Consigne de revision detectee (active) -->
  <div
    x-show="consigne && consigne.found && useConsigne"
    x-transition
    class="mb-4 bg-success-light border border-success/30 rounded-card p-4 animate-slide-up"
  >
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 bg-surface rounded-[0.75rem] shadow-card flex items-center justify-center shrink-0"
      >
        <i data-lucide="target" class="w-5 h-5 text-success-dark"></i>
      </div>
      <div class="flex-1 min-w-0">
        <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
        <h3
          class="font-heading font-bold text-success-dark text-body-sm"
          x-text="t('sources.consigneDetected')"
        >
          Instructions detected
        </h3>
        <p
          class="text-sm text-text-primary"
          x-text="t('sources.keyTopics', { count: (consigne?.keyTopics || []).length })"
        ></p>
      </div>
      <button
        @click="$refs.consigneDialog?.showModal(); refreshIcons()"
        class="min-w-[36px] min-h-[36px] flex items-center justify-center rounded-button text-success-dark hover:bg-success/20 focus-ring"
        :title="t('sources.viewDetails')"
      >
        <i data-lucide="eye" class="w-4 h-4"></i>
      </button>
      <button
        @click="useConsigne = false; localStorage.setItem(`consigne-dismissed-${currentProjectId}`, 'true'); showToast(t('consigne.dismissed'), 'info'); $nextTick(() => refreshIcons())"
        class="min-w-[36px] min-h-[36px] flex items-center justify-center rounded-button text-text-secondary hover:bg-red-100 hover:text-red-600 focus-ring"
        :title="t('consigne.dismiss')"
      >
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <!-- Consigne dismissed — small re-enable banner -->
  <div
    x-show="consigne && consigne.found && !useConsigne"
    x-transition
    class="mb-4 bg-gray-50 border border-gray-200 rounded-card px-4 py-2.5"
  >
    <div class="flex items-center gap-2">
      <i data-lucide="target" class="w-4 h-4 text-text-secondary shrink-0"></i>
      <span class="text-sm text-text-secondary flex-1" x-text="t('consigne.dismissedLabel')"></span>
      <button
        @click="useConsigne = true; localStorage.removeItem(`consigne-dismissed-${currentProjectId}`); showToast(t('consigne.reEnabled'), 'success'); $nextTick(() => refreshIcons())"
        class="text-sm font-semibold text-primary hover:text-primary-dark focus-ring rounded px-2 py-1"
        x-text="t('consigne.reEnable')"
      ></button>
    </div>
  </div>

  <!-- Re-analyser consigne button -->
  <div x-show="sources.length > 0 && (!consigne || !consigne.found)" class="mb-4">
    <button
      @click="detectConsigne()"
      :disabled="consigneLoading"
      class="text-sm text-text-secondary hover:text-primary flex items-center gap-1.5 focus-ring rounded px-2 py-1"
    >
      <i data-lucide="target" class="w-3.5 h-3.5"></i>
      <span x-text="consigneLoading ? t('sources.analyzing') : t('sources.detectConsigne')"></span>
    </button>
  </div>

  <!-- Upload progress -->
  <div x-show="uploading" class="mb-4 bg-surface rounded-card shadow-card p-4">
    <div class="flex items-center gap-3 text-primary-dark">
      <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
      <span
        class="text-body-sm font-medium"
        x-text="t('sources.ocrProgress', { current: uploadProgress.current, total: uploadProgress.total, filename: uploadProgress.filename })"
      ></span>
    </div>
    <div class="mt-2 w-full bg-gray-200 rounded-full h-2">
      <div
        class="bg-primary h-2 rounded-full transition-all duration-300"
        :style="'width: ' + (uploadProgress.total ? (uploadProgress.current / uploadProgress.total * 100) : 0) + '%'"
      ></div>
    </div>
  </div>

  <!-- Sources list -->
  <div x-show="sources.length > 0" class="space-y-2 mb-4">
    <div class="flex items-center justify-between mb-2">
      <!-- NOSONAR(S5254) — Alpine.js x-text fills heading content at runtime -->
      <h3
        class="font-heading font-semibold text-sm text-text-primary"
        x-text="t('sources.addedSources')"
      >
        Added sources
      </h3>
      <div class="flex items-center gap-3">
        <button
          @click="selectedIds = selectedIds.length === sources.length ? [] : sources.map(s => s.id)"
          class="text-body-sm text-primary hover:text-primary-dark font-medium focus-ring rounded"
          x-text="selectedIds.length === sources.length ? t('sources.deselectAll') : t('sources.selectAll')"
        ></button>
        <span
          class="text-body-sm text-text-secondary"
          x-text="selectedIds.length + '/' + sources.length"
        ></span>
      </div>
    </div>
    <template x-for="src in [...sources].reverse()" :key="src.id">
      <div class="flex items-center gap-3 bg-surface rounded-button p-3 shadow-card card-lift">
        <input
          type="checkbox"
          :value="src.id"
          x-model="selectedIds"
          class="w-5 h-5 rounded text-primary focus-ring shrink-0"
        />
        <i :data-lucide="sourceTypeIcon(src)" class="w-5 h-5 text-text-secondary shrink-0"></i>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-medium text-body-sm truncate" x-text="src.filename"></span>
            <!-- Scrape engine badge -->
            <span
              x-show="src.scrapeEngine === 'readability'"
              class="shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-success-light text-success-dark"
              title="Readability"
            >R</span>
            <span
              x-show="src.scrapeEngine === 'lightpanda'"
              class="shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-primary-light text-primary"
              title="Lightpanda"
            >LP</span>
            <span
              x-show="src.scrapeEngine === 'mistral'"
              class="shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-purple-100 text-purple-700"
              title="Mistral web_search"
            >AI</span>
            <span
              x-show="src.moderation?.status === 'safe'"
              class="shrink-0"
              :title="t('moderation.safe')"
            >
              <i data-lucide="shield-check" class="w-4 h-4 text-success"></i>
            </span>
            <span
              x-show="src.moderation?.status === 'unsafe'"
              class="shrink-0"
              :title="t('moderation.unsafe') + (flaggedCategoryLabels(src) ? ' — ' + flaggedCategoryLabels(src) : '')"
            >
              <i data-lucide="shield-alert" class="w-4 h-4 text-danger"></i>
            </span>
            <span
              x-show="src.moderation?.status === 'pending'"
              class="shrink-0"
              :title="t('moderation.pending')"
            >
              <i data-lucide="loader-circle" class="w-4 h-4 text-primary animate-spin"></i>
            </span>
            <span
              x-show="src.moderation?.status === 'error'"
              class="shrink-0"
              :title="t('moderation.error')"
            >
              <i data-lucide="shield-x" class="w-4 h-4 text-warning-dark"></i>
            </span>
          </div>
          <p
            class="text-sm text-text-secondary line-clamp-1"
            x-text="src.markdown.slice(0, 100)"
          ></p>
        </div>
        <button
          @click="openSourceDialog(src)"
          class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-primary focus-ring rounded shrink-0"
          :aria-label="isOcrSource(src) && getOriginalFileUrl(src) ? t('sources.viewCompare') : t('sources.viewText')"
        >
          <i
            :data-lucide="isOcrSource(src) && getOriginalFileUrl(src) ? 'columns' : 'eye'"
            class="w-4 h-4"
          ></i>
        </button>
        <button
          @click="confirmDelete('source', () => deleteSource(src.id))"
          class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-danger focus-ring rounded shrink-0"
          :aria-label="t('sources.deleteSource')"
        >
          <i data-lucide="trash-2" class="w-4 h-4"></i>
        </button>
      </div>
    </template>
  </div>

  <!-- Empty sources -->
  <div x-show="sources.length === 0 && !uploading" class="text-center py-8">
    <div
      class="w-16 h-16 mx-auto mb-3 bg-accent-light rounded-[1rem] border border-accent/20 flex items-center justify-center"
    >
      <i data-lucide="upload-cloud" class="w-8 h-8 text-accent"></i>
    </div>
    <p class="text-text-primary font-semibold mb-1" x-text="t('sources.emptyTitle')"></p>
    <p class="text-text-secondary text-body-sm" x-text="t('sources.emptySubtitle')"></p>
  </div>

  <!-- Drag & drop zone -->
  <div
    class="border-2 border-dashed rounded-card p-6 text-center transition-colors mb-4"
    :class="dragging ? 'border-primary bg-primary-light' : 'border-gray-300'"
    @dragover.prevent="dragging = true"
    @dragleave.prevent="dragging = false"
    @drop.prevent="handleDrop($event)"
  >
    <i data-lucide="upload" class="w-8 h-8 mx-auto mb-2 text-text-secondary"></i>
    <p class="text-body-sm text-text-secondary" x-text="t('sources.dragDrop')"></p>
    <p class="text-sm text-text-secondary" x-text="t('sources.dragDropFormats')"></p>
  </div>
</div>
