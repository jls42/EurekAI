<!-- Collapse header (shared partial) -->
<!-- Params: icon, chipClass, colorClass -->
<!-- hasScore: set to "true" for quiz/fill-blank (shows last attempt score badge) -->
<div
  role="button"
  tabindex="0"
  @click="toggleGen(gen.id)"
  @keydown.enter="toggleGen(gen.id)"
  class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors focus-ring text-left cursor-pointer"
  :aria-expanded="openGens[gen.id] ? 'true' : 'false'"
>
  <span class="icon-chip {{chipClass}} shrink-0"
    ><i data-lucide="{{icon}}" class="w-4 h-4 text-{{colorClass}}"></i
  ></span>
  <div class="flex-1 min-w-0">
    <template x-if="editingTitle !== gen.id">
      <span
        class="font-semibold text-body-sm text-text-primary truncate block"
        x-text="gen.title"
        @dblclick.stop="startEditTitle(gen)"
      ></span>
    </template>
    <template x-if="editingTitle === gen.id">
      <input
        x-model="editTitleValue"
        @click.stop
        @keydown.enter="saveTitle(gen)"
        @keydown.escape="editingTitle = null"
        @blur="saveTitle(gen)"
        class="w-full border-2 border-primary rounded-button px-2 py-0.5 text-body-sm focus-ring"
        x-ref="titleInput"
      />
    </template>
    <span
      class="text-sm text-text-secondary"
      x-text="new Date(gen.createdAt).toLocaleTimeString(dateLocale())"
    ></span>
  </div>
  {{#if hasScore}}
  <template x-if="gen.stats && gen.stats.attempts.length > 0">
    <span
      class="text-xs px-2.5 py-1 rounded-badge font-bold shrink-0"
      :class="gen.stats.attempts[gen.stats.attempts.length-1].score === gen.stats.attempts[gen.stats.attempts.length-1].total ? 'bg-success-light text-success-dark' : 'bg-warning-light text-warning-dark'"
      x-text="gen.stats.attempts[gen.stats.attempts.length-1].score + '/' + gen.stats.attempts[gen.stats.attempts.length-1].total"
    ></span>
  </template>
  {{/if}}
  <button
    @click.stop="startEditTitle(gen)"
    class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-primary focus-ring rounded shrink-0"
    :aria-label="t('common.rename')"
  >
    <i data-lucide="pencil" class="w-4 h-4"></i>
  </button>
  <button
    @click.stop="confirmDelete('generation', () => deleteGen(gen))"
    class="min-w-[32px] min-h-[32px] flex items-center justify-center text-text-secondary hover:text-danger focus-ring rounded shrink-0"
    :aria-label="t('common.delete')"
  >
    <i data-lucide="trash-2" class="w-4 h-4"></i>
  </button>
  <i
    data-lucide="chevron-down"
    class="w-5 h-5 text-text-secondary shrink-0 transition-transform"
    :class="openGens[gen.id] && 'rotate-180'"
  ></i>
</div>
