<!-- Moderation badge for sources -->
<!-- Params: sourceRef, badgeClass, wrapperClass, iconClass -->
<!-- Uses separate <i> per state to avoid Lucide + Alpine :data-lucide desync -->
<template x-if="{{sourceRef}}.moderation?.status">
  <span
    class="inline-block {{wrapperClass}}"
    @mouseenter="showModerationPopover($el, {{sourceRef}})"
    @mouseleave="hideMetaPopover()"
  >
    <span
      class="source-meta-pill {{badgeClass}} cursor-pointer"
      :class="moderationBadgeColor({{sourceRef}})"
    >
      <i
        x-show="moderationStatus({{sourceRef}}) === 'pending'"
        data-lucide="loader-circle"
        class="{{iconClass}} animate-spin"
      ></i>
      <i
        x-show="moderationStatus({{sourceRef}}) === 'safe'"
        data-lucide="shield-check"
        class="{{iconClass}}"
      ></i>
      <i
        x-show="moderationStatus({{sourceRef}}) === 'unsafe'"
        data-lucide="shield-alert"
        class="{{iconClass}}"
      ></i>
      <i
        x-show="moderationStatus({{sourceRef}}) === 'error'"
        data-lucide="shield-x"
        class="{{iconClass}}"
      ></i>
    </span>
  </span>
</template>
