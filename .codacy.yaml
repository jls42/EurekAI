---
# Configuration Codacy par fichier.
# https://docs.codacy.com/repositories-configure/configuration-file/

engines:
  # Lizard (cyclomatic complexity) : Codacy/Lizard a un bug d'analyse sur ce
  # fichier — il attribue systématiquement les entrées des tables de lookup
  # (Map.get, switch/case, if-chain) comme branches cyclomatiques de la
  # fonction appelante, aboutissant à CCN 10-14 sur une fonction dont la
  # McCabe réelle est 2-3. Quatre refactors successifs (Map → if-chain →
  # switch → object-lookup) ont tous été flaggés malgré une structure
  # triviale. On exclut le fichier de Lizard uniquement ; autres engines
  # (ESLint, Trivy, Semgrep, etc.) restent actifs.
  lizard:
    exclude_paths:
      - 'helpers/error-code-resolution.ts'
